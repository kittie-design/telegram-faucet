<section id="withdrawalScreen" class="tab fade-in">
    <h2 class="title">💸 Withdraw</h2>

    <div class="withdraw-card">
        <h3>💗 Your FaucetPay Email</h3>
        <input id="fpEmailInput" class="withdraw-input" placeholder="example@email.com">
        <button id="saveFpEmailBtn" class="withdraw-btn">Save Email</button>
        <p id="fpEmailStatus" class="status-text"></p>
    </div>

    <div class="withdraw-card">
        <h3>💰 Points Available</h3>
        <p id="withdrawPoints">0 points</p>
    </div>

    <div class="withdraw-card">
        <h3>💵 Withdraw Amount</h3>
        <input id="withdrawAmountInput" class="withdraw-input" placeholder="Enter points">
        <button id="withdrawBtn" class="withdraw-btn">Withdraw</button>
        <p id="withdrawStatus" class="status-text"></p>
    </div>
</section>
