<script>
    // 1. Initialize Telegram
    const tg = window.Telegram.WebApp;
    tg.ready();

    // 2. Load User Profile immediately (won't be blocked by ad errors)
    const userProfile = document.getElementById('user-profile');
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        userProfile.innerHTML = `<strong>Telegram User Details:</strong><br>🆔 ID: ${user.id}<br>👤 Name: ${user.first_name} ${user.last_name || ''}<br>🏷️ Username: @${user.username || 'N/A'}`;
    }

    // 3. Robust Adsgram Initialization with Retry Logic
    let AdController;
    let BannerController;

    function initAds() {
        if (window.Adsgram) {
            try {
                AdController = window.Adsgram.init({ blockId: "36589" });
                BannerController = window.Adsgram.init({ blockId: "int-36599" });
                BannerController.render({ container: "banner-ad-container" });
            } catch (e) {
                console.error("Adsgram init error:", e);
            }
        } else {
            // If not loaded yet, wait 500ms and try again
            setTimeout(initAds, 500);
        }
    }
    initAds();

    // 4. Video Button Logic
    const adBtn = document.getElementById('watch-ad-btn');
    const statusMsg = document.getElementById('status-msg');

    adBtn.addEventListener('click', () => {
        if (!AdController) {
            statusMsg.innerText = "Ad system still loading, please wait...";
            return;
        }
        
        statusMsg.innerText = "🔄 Playing ad...";
        AdController.show()
            .then((result) => {
                statusMsg.innerText = "🎉 Success! Sending crypto...";
                triggerPayoutOnBackend();
            })
            .catch((err) => {
                console.log("Adsgram error, falling back...");
                runNetwork2Fallback();
            });
    });

    function runNetwork2Fallback() {
        statusMsg.innerText = "🔄 Fallback ad...";
        setTimeout(() => {
            statusMsg.innerText = "🎉 Fallback success! Sending crypto...";
            triggerPayoutOnBackend();
        }, 2000);
    }

    function triggerPayoutOnBackend() {
        const backendUrl = 'https://telegram-faucet.vercel.app/api/payout';
        const userId = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : "6182828818";
        fetch(backendUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: userId })
        }).catch(err => console.error("Payout error."));
    }
</script>
