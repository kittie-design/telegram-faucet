<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch & Earn Faucet</title>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--tg-theme-bg-color, #17212b);
        color: var(--tg-theme-text-color, #f5f5f5);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        text-align: center;
    }
    .card {
        background-color: var(--tg-theme-secondary-bg-color, #24303f);
        border-radius: 12px;
        padding: 20px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        margin-bottom: 20px;
    }
    h1 {
        font-size: 24px;
        margin-bottom: 10px;
        color: var(--tg-theme-button-color, #5288c1);
    }
    .section {
        background: rgba(255,255,255,0.05);
        padding: 12px;
        border-radius: 10px;
        margin-top: 15px;
        text-align: left;
        font-size: 14px;
    }
    .btn {
        background-color: var(--tg-theme-button-color, #5288c1);
        color: var(--tg-theme-button-text-color, #ffffff);
        border: none;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        margin-top: 15px;
    }
    .btn:active { opacity: 0.8; }
    .status {
        margin-top: 10px;
        font-size: 14px;
        color: #8aa1b1;
    }
</style>
</head>
<body>
<div class="card">
    <img src="banner.png" style="width:100%; border-radius:10px; margin-bottom:15px;">
    <h1>Watch & Earn</h1>
    <p>Earn crypto instantly via FaucetPay</p>
    <div class="section" id="user-info">Loading user...</div>
    <div class="section">
        <strong>Points Balance:</strong> <span id="points">0</span><br>
        <strong>Daily Ads:</strong> <span id="daily">0</span>/25<br>
        <strong>Next Ad In:</strong> <span id="cooldown">Ready</span><br>
        <strong>Daily Reset:</strong> <span id="daily-reset">--</span>
    </div>
    <button class="btn" onclick="watchAdToEarn()">🎬 Watch Video Ad</button>
    <div class="status" id="status-msg">Click the button to view an ad</div>
    <button class="btn" onclick="withdraw()">💸 Withdraw (1000 pts = 1 USDC)</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

const user = tg.initDataUnsafe?.user;
const userId = user?.id;

document.getElementById("user-info").innerHTML = `
    <strong>Telegram User:</strong><br>
    ID: ${userId}<br>
    Username: @${user?.username}
`;

let cooldownEnd = 0;
let dailyResetEnd = 0;

// ---------------------------
// SUPABASE CONFIG
// ---------------------------
const SUPABASE_URL = "https://kqibtnapvzlrevfkfgdx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxaWJ0bmFwdnpscmV2ZmtmZ2R4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NjI0MzMsImV4cCI6MjA5ODUzODQzM30.BVLSjJACD_YEfgklL-N_QPMvFwmGvOQtmzX6SGIWqo0" "PASTE_YOUR_ANON_KEY_HERE"; // safe to expose in frontend code

const supabaseHeaders = {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
};

// ---------------------------
// LOAD USER DATA FROM SUPABASE
// ---------------------------
async function loadUser() {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/user`, {
        method: "POST",
        headers: supabaseHeaders,
        body: JSON.stringify({ userId })
    });
    const data = await res.json();
    document.getElementById("points").innerText = data.points;
    document.getElementById("daily").innerText = data.daily_ads;
    cooldownEnd = data.cooldown_end;
    dailyResetEnd = data.daily_reset_end;
}
loadUser();

setInterval(updateTimers, 1000);

// ---------------------------
// UPDATE TIMERS
// ---------------------------
function updateTimers() {
    const now = Date.now();

    // 60s cooldown
    if (cooldownEnd > now) {
        const sec = Math.floor((cooldownEnd - now) / 1000);
        document.getElementById("cooldown").innerText = sec + "s";
    } else {
        document.getElementById("cooldown").innerText = "Ready";
    }

    // 24h daily reset
    if (dailyResetEnd > now) {
        const hrs = Math.floor((dailyResetEnd - now) / 3600000);
        const min = Math.floor(((dailyResetEnd - now) % 3600000) / 60000);
        document.getElementById("daily-reset").innerText = `${hrs}h ${min}m`;
    } else {
        document.getElementById("daily-reset").innerText = "Ready";
    }
}

// ---------------------------
// WATCH AD → CALL SUPABASE
// ---------------------------
const AdController = window.Adsgram.init({ blockId: "36589" });

function watchAdToEarn() {
    if (Date.now() < cooldownEnd) {
        alert("Please wait for cooldown to finish.");
        return;
    }

    AdController.show()
        .then(async () => {
            document.getElementById("status-msg").innerText = "Rewarding +3 points...";
            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/earn`, {
                    method: "POST",
                    headers: supabaseHeaders,
                    body: JSON.stringify({ userId })
                });
                if (!res.ok) throw new Error(`Server returned ${res.status}`);
                const data = await res.json();
                document.getElementById("points").innerText = data.points;
                document.getElementById("daily").innerText = data.daily_ads;
                cooldownEnd = data.cooldown_end;
                dailyResetEnd = data.daily_reset_end;
                alert("Video completed! +3 points added.");
            } catch (err) {
                console.error(err);
                alert("Reward failed to save — server error. Try again.");
            }
        })
        .catch((err) => {
            console.error(err);
            alert("You must watch the full video.");
        });
}

// ---------------------------
// WITHDRAW
// ---------------------------
async function withdraw() {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/withdraw`, {
        method: "POST",
        headers: supabaseHeaders,
        body: JSON.stringify({ userId })
    });
    const data = await res.json();
    if (data.error) {
        alert(data.error);
        return;
    }
    document.getElementById("points").innerText = data.points;
    alert("Withdrawal successful!");
}
</script>
</body>
</html>
