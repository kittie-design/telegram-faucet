<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background-color: #0c0e12; color: white; font-family: sans-serif; margin: 0; }
        /* Tab Content Styling */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        /* Dark Rounded Cards (Matches UI in 1000035866_2.jpg) */
        .card { background: #1a1d24; border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        
        /* Bottom Navigation Bar (Matches UI in 1000035869_3.jpg) */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #0f1115; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { color: #888; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #00ff88; }
    </style>
</head>
<body>

    <!-- Home Tab -->
    <div id="home" class="page active">
        <div class="card">Points Balance: 0</div>
        <div class="card">Watch Ad</div>
    </div>

    <!-- My Account Tab -->
    <div id="account" class="page">
        <h3>Account</h3>
        <div class="card">Telegram ID: <span id="tg-id">Loading...</span></div>
    </div>

    <!-- Navigation -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('home')">🏠 Home</div>
        <div class="nav-item" onclick="showTab('earn')">💰 Earn</div>
        <div class="nav-item" onclick="showTab('friends')">👥 Friends</div>
        <div class="nav-item" onclick="showTab('account')">👤 My Account</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Initialize User Data
        const tg = window.Telegram.WebApp;
        tg.ready();
        document.getElementById('tg-id').innerText = tg.initDataUnsafe?.user?.id || "N/A";

        function showTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
