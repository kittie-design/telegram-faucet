<!DOCTYPE html>
<html lang="en">
<head>
    <div class="card">
    <img src="banner.png" alt="Telegram Faucet" style="width:100%; border-radius:10px; margin-bottom:15px;">
    <h1>Watch & Earn</h1>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch & Earn Faucet</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* 2. Using Telegram CSS variables to perfectly match light/dark mode natively */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #17212b);
            color: var(--tg-theme-text-color, #f5f5f5);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color, #24303f);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--tg-theme-button-color, #5288c1);
        }

        .user-info {
            font-size: 14px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
            word-break: break-all;
        }

        .btn {
            background-color: var(--tg-theme-button-color, #5288c1);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s ease;
        }

        .btn:active {
            opacity: 0.8;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #8aa1b1;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Watch & Earn</h1>
        <p>Complete tasks to get paid instantly via FaucetPay!</p>
        
        <div class="user-info" id="user-profile">
            Loading Telegram user details...
        </div>

        <button class="btn" id="watch-ad-btn">🎬 Watch Video Ad</button>
        <div class="status" id="status-msg">Click the button to view an ad</div>
    </div>

    <script>
        // 3. Initialize the Telegram WebApp instance
        const tg = window.Telegram.WebApp;
        
        // Notify Telegram that the application is ready and expanded fully
        tg.ready();
        tg.expand();

        // 4. Capture and display the user's specific Telegram Data
        const profileDiv = document.getElementById('user-profile');
        const user = tg.initDataUnsafe?.user;

        if (user) {
            profileDiv.innerHTML = `
                <strong>Telegram User Details:</strong><br>
                🆔 ID: <span id="tg-id">${user.id}</span><br>
                👤 Name: ${user.first_name} ${user.last_name || ''}<br>
                🏷️ Username: @${user.username || 'N/A'}
            `;
        } else {
            // Fallback visualization if opened outside of Telegram (like a desktop web browser)
            profileDiv.innerHTML = `
                ⚠️ <strong>Not in Telegram:</strong><br>
                Running in standard web browser mode. Mock user applied.<br>
                🆔 ID: <span id="tg-id">123456789</span>
            `;
        }

        // 5. Handling the Ad view event click
        document.getElementById('watch-ad-btn').addEventListener('click', () => {
            const status = document.getElementById('status-msg');
            const userId = document.getElementById('tg-id').innerText;
            
            status.innerText = "Initializing Ad layer...";
            
            /* Once you get your Adsgram Block ID, you will uncomment this execution code block:
               
               window.Adsgram.init({ blockId: "YOUR_ADSGRAM_BLOCK_ID_HERE" }).show().then((result) => {
                   status.innerText = "✅ Ad finished! Sending claim request to server...";
                   triggerPayoutOnBackend(userId);
               }).catch((result) => {
                   status.innerText = "❌ Ad skipped or failed to load.";
               });
            */

            // Temporary mock logic for local testing without an ad provider active:
            setTimeout(() => {
                status.innerText = "🎉 Mock Ad Complete! Ready to pay out user ID: " + userId;
                // triggerPayoutOnBackend(userId);
            }, 3000);
        });

        // 6. Communicating with your hidden secure backend function
        function triggerPayoutOnBackend(telegramId) {
            // Replace with your real Vercel/Netlify backend endpoint address later
            const backendUrl = 'https://your-backend-api.vercel.app/api/pay';

            fetch(backendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: telegramId })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('status-msg').innerText = "💰 Paid! check your FaucetPay account.";
            })
            .catch(err => {
                document.getElementById('status-msg').innerText = "⚠️ Network error sending payout.";
            });
        }
    </script>
</body>
</html>
