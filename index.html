<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzCash</title>
    <style>
        body { margin: 0; background-color: #0c0e12; color: #ffffff; font-family: sans-serif; padding-bottom: 80px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: #1a1d24; border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        
        /* Popup Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1d24; padding: 20px; border-radius: 16px; width: 80%; text-align: center; }

        h2 { margin: 0 0 10px 0; font-size: 16px; color: #888; }
        .btn-withdraw { width: 100%; background: #00ff88; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Home Tab -->
    <div id="home" class="page active">
        <div class="card">
            <h2>Points Balance</h2>
            <div class="balance">0</div>
            <button class="btn-withdraw">Withdraw</button>
        </div>
    </div>

    <!-- Friends Tab -->
    <div id="friends" class="page">
        <h2>Friends</h2>
        <button onclick="openPopup()">Open Invite Popup</button>
    </div>

    <!-- Account Tab -->
    <div id="account" class="page">
        <h2>ACCOUNT</h2>
        <div class="card">
            <p>Telegram ID: <span id="tg-id">Loading...</span></p>
            <p>Hello, <span id="username">Loading...</span></p>
            <p>Your Referral Link: <span id="ref-link"></span></p>
        </div>
    </div>

    <!-- The Popup (Hidden by default) -->
    <div id="invite-popup" class="modal">
        <div class="modal-content">
            <h3>Invite Friend</h3>
            <p>Share this link to earn points!</p>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('home')">🏠 Home</div>
        <div class="nav-item" onclick="showTab('friends')">👥 Friends</div>
        <div class="nav-item" onclick="showTab('account')">👤 Account</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Populate User Info
        if (tg.initDataUnsafe?.user) {
            document.getElementById('tg-id').innerText = tg.initDataUnsafe.user.id;
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('ref-link').innerText = `https://t.me/YOUR_BOT?start=${tg.initDataUnsafe.user.id}`;
        }

        // Navigation
        function showTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // Popup Logic
        function openPopup() {
            document.getElementById('invite-popup').classList.add('active');
        }
        function closePopup() {
            document.getElementById('invite-popup').classList.remove('active');
        }
    </script>
</body>
</html>
